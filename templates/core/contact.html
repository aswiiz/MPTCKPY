{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Contact Us</h1>
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <h4 class="card-title mb-4">Get in Touch</h4>
                    <p><i class="bi bi-geo-alt text-primary me-2"></i> <strong>Address:</strong><br>
                    Model Polytechnic College,<br>Karunagappally, Kollam District,<br>Kerala, India - 690518</p>
                    
                    <p><i class="bi bi-telephone text-primary me-2"></i> <strong>Phone:</strong><br>
                    +91 0000000000</p>
                    
                    <p><i class="bi bi-envelope text-primary me-2"></i> <strong>Email:</strong><br>
                    info@mptckarunagappally.edu.in</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h4 class="card-title mb-4">Send a Message</h4>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
