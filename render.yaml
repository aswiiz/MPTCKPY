services:
  - type: web
    name: mptc-website
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mptc.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mptc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

databases:
  - name: mptc-db
    databaseName: mptc
    user: mptc_user
